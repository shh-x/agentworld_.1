<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent Simulation - Space Station</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background-color: #050a14;
            font-family: 'Share Tech Mono', monospace;
            color: #8ab4c4;
        }
        
        #canvas-container {
            position: fixed;
            inset: 0;
            z-index: 1;
        }
        
        /* HUD Panels */
        .hud-panel {
            position: fixed;
            background: rgba(5, 10, 20, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid #0d2a3a;
            z-index: 10;
            overflow: hidden;
        }
        
        #top-bar {
            top: 0;
            left: 0;
            right: 0;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            border-bottom: 1px solid #0d2a3a;
        }
        
        #bottom-bar {
            bottom: 0;
            left: 0;
            right: 0;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            border-top: 1px solid #0d2a3a;
            gap: 12px;
        }
        
        #left-panel {
            top: 48px;
            left: 0;
            width: 220px;
            bottom: 32px;
            border-right: 1px solid #0d2a3a;
        }
        
        #right-panel {
            top: 48px;
            right: 0;
            width: 240px;
            bottom: 32px;
            border-left: 1px solid #0d2a3a;
        }
        
        /* HUD Content Styles */
        .hud-title {
            color: #00e5ff;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 8px rgba(0, 229, 255, 0.5);
        }
        
        .hud-text {
            color: #8ab4c4;
            font-size: 12px;
            line-height: 1.4;
        }
        
        .hud-accent {
            color: #00e5ff;
        }
        
        .hud-danger {
            color: #ff4444;
        }
        
        .hud-section {
            padding: 12px;
            border-bottom: 1px solid rgba(13, 42, 58, 0.5);
        }
        
        .hud-section:last-child {
            border-bottom: none;
        }
        
        .hud-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }
        
        .hud-item:last-child {
            margin-bottom: 0;
        }
        
        /* Top Bar Layout */
        .top-bar-left {
            flex: 1;
        }
        
        .top-bar-center {
            flex: 1;
            text-align: center;
        }
        
        .top-bar-right {
            flex: 1;
            text-align: right;
        }
        
        /* Panel Headers */
        .panel-header {
            background: rgba(0, 229, 255, 0.1);
            padding: 8px 12px;
            border-bottom: 1px solid #0d2a3a;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1px;
        }
        
        .panel-header.event-log-header {
            color: #00e5ff;
            font-size: 10px;
            letter-spacing: 2px;
        }
        
        .panel-content {
            padding: 12px;
        }
        
        /* Agent Cards */
        .agent-card {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid #0d2a3a;
            border-radius: 4px;
            padding: 8px;
            margin-bottom: 8px;
            transition: opacity 0.3s ease;
        }
        
        .agent-card.dead {
            opacity: 0.3;
        }
        
        .agent-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 4px;
        }
        
        .agent-info {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .agent-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        
        .agent-name {
            font-weight: bold;
            color: #8ab4c4;
            font-size: 11px;
        }
        
        .role-badge {
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 9px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .role-badge.crew {
            background: rgba(0, 255, 0, 0.2);
            color: #00ff00;
            border: 1px solid rgba(0, 255, 0, 0.4);
        }
        
        .role-badge.imp {
            background: rgba(255, 0, 0, 0.2);
            color: #ff0000;
            border: 1px solid rgba(255, 0, 0, 0.4);
        }
        
        .role-badge.hidden {
            background: rgba(136, 180, 196, 0.2);
            color: #8ab4c4;
            border: 1px solid rgba(136, 180, 196, 0.4);
        }
        
        .agent-status {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 4px;
            font-size: 10px;
        }
        
        .room-name {
            color: #00e5ff;
        }
        
        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(13, 42, 58, 0.5);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 2px;
        }
        
        .progress-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.3s ease;
        }
        
        .health-fill {
            background: linear-gradient(to right, #ff0000, #ffff00, #00ff00);
        }
        
        .task-fill {
            background: #00e5ff;
        }
        
        .agent-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 9px;
            color: #8ab4c4;
        }
        
        .health-text {
            color: #8ab4c4;
        }
        
        .task-text {
            color: #00e5ff;
        }
        
        /* Top Bar Elements */
        .station-title {
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            font-size: 16px;
            color: #00e5ff;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.8),
                         0 0 20px rgba(0, 229, 255, 0.4);
            letter-spacing: 2px;
        }
        
        .phase-pill {
            background: #00e5ff;
            color: #050a14;
            padding: 4px 12px;
            border-radius: 16px;
            font-family: 'Share Tech Mono', monospace;
            font-weight: bold;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }
        
        .phase-pill.roaming {
            background: #00e5ff;
            color: #050a14;
        }
        
        .phase-pill.meeting {
            background: #cc88ff;
            color: #050a14;
        }
        
        .phase-pill.voting {
            background: #ffcc00;
            color: #050a14;
        }
        
        .phase-pill.gameover {
            background: #ff4444;
            color: #050a14;
        }
        
        .stat-chips {
            display: flex;
            gap: 8px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px;
            color: #8ab4c4;
        }
        
        .stat-chip {
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid #00e5ff;
            padding: 2px 6px;
            border-radius: 4px;
            color: #00e5ff;
        }
        
        /* Bottom Bar Elements */
        .control-buttons {
            display: flex;
            gap: 8px;
        }
        
        .control-btn {
            background: rgba(5, 10, 20, 0.8);
            border: 1px solid #00e5ff;
            color: #00e5ff;
            padding: 4px 8px;
            border-radius: 4px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .control-btn:hover {
            background: rgba(0, 229, 255, 0.2);
            box-shadow: 0 0 8px rgba(0, 229, 255, 0.6);
            text-shadow: 0 0 4px rgba(0, 229, 255, 0.8);
        }
        
        .control-btn:active {
            transform: scale(0.95);
        }
        
        .speed-control {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px;
            color: #8ab4c4;
        }
        
        .speed-dots {
            display: flex;
            gap: 4px;
        }
        
        .speed-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(136, 180, 196, 0.3);
            border: 1px solid rgba(136, 180, 196, 0.5);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .speed-dot.active {
            background: #00e5ff;
            border-color: #00e5ff;
            box-shadow: 0 0 4px rgba(0, 229, 255, 0.6);
        }
        
        .speed-dot:hover {
            background: rgba(0, 229, 255, 0.6);
            border-color: #00e5ff;
        }
        
        .camera-toggle {
            background: rgba(5, 10, 20, 0.8);
            border: 1px solid #00e5ff;
            color: #00e5ff;
            padding: 4px 8px;
            border-radius: 4px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .camera-toggle:hover {
            background: rgba(0, 229, 255, 0.2);
            box-shadow: 0 0 8px rgba(0, 229, 255, 0.6);
            text-shadow: 0 0 4px rgba(0, 229, 255, 0.8);
        }
        
        /* Event Log */
        .event-log {
            max-height: 200px;
            overflow-y: auto;
        }
        
        .event-item {
            padding: 4px 0;
            border-bottom: 1px solid rgba(13, 42, 58, 0.3);
            font-size: 11px;
            font-family: 'Share Tech Mono', monospace;
            animation: slideInFromRight 200ms ease-out;
        }
        
        .event-item:last-child {
            border-bottom: none;
        }
        
        .event-time {
            color: #00e5ff;
            margin-right: 8px;
            font-weight: bold;
        }
        
        /* Event Type Colors */
        .event-move {
            color: #4a6a7a;
        }
        
        .event-task {
            color: #00cc66;
        }
        
        .event-kill {
            color: #ff4444;
        }
        
        .event-meeting {
            color: #cc88ff;
        }
        
        .event-vote {
            color: #ffcc00;
        }
        
        .event-system {
            color: #2a4a5a;
        }
        
        /* Event Log Animation */
        @keyframes slideInFromRight {
            from {
                transform: translateX(20px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        /* Custom Scrollbar for Event Log */
        .event-log::-webkit-scrollbar {
            width: 4px;
        }
        
        .event-log::-webkit-scrollbar-track {
            background: rgba(5, 10, 20, 0.5);
        }
        
        .event-log::-webkit-scrollbar-thumb {
            background: #00e5ff;
            border-radius: 2px;
        }
        
        .event-log::-webkit-scrollbar-thumb:hover {
            background: #00ffff;
        }
        
        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(5, 10, 20, 0.5);
        }
        
        ::-webkit-scrollbar-thumb {
            background: #0d2a3a;
            border-radius: 3px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #1a3a4a;
        }
    </style>
</head>
<body>
    <!-- Three.js Canvas - Full Screen -->
    <div id="canvas-container"></div>
    
    <!-- HUD Panels -->
    <div id="top-bar" class="hud-panel">
        <div class="top-bar-left">
            <div class="station-title">⬡ VOID STATION</div>
        </div>
        <div class="top-bar-center">
            <div class="phase-pill roaming" id="phase-display">ROAMING</div>
        </div>
        <div class="top-bar-right">
            <div class="stat-chips">
                <div class="stat-chip">ROUND: <span id="round-counter">01</span></div>
                <div class="stat-chip">ALIVE: <span id="alive-counter">6/6</span></div>
                <div class="stat-chip">TASKS: <span id="task-counter">0/18</span></div>
            </div>
        </div>
    </div>
    
    <div id="bottom-bar" class="hud-panel">
        <div class="control-buttons">
            <button class="control-btn" id="start-btn"> START</button>
            <button class="control-btn" id="pause-btn"> PAUSE</button>
            <button id="spawn-btn" class="control-btn">SPAWN AGENTS</button>
            <button id="reset-btn" class="control-btn"> RESET</button>
        </div>
        <div class="speed-control">
            <span>SPEED:</span>
            <div class="speed-dots" id="speed-dots">
                <div class="speed-dot" data-speed="1"></div>
                <div class="speed-dot" data-speed="2"></div>
                <div class="speed-dot active" data-speed="3"></div>
                <div class="speed-dot" data-speed="4"></div>
                <div class="speed-dot" data-speed="5"></div>
            </div>
        </div>
        <div class="camera-toggle" id="camera-toggle">CAM: ORBIT</div>
    </div>
    
    <div id="left-panel" class="hud-panel">
        <div class="panel-header">Agents</div>
        <div class="panel-content" id="agent-cards">
            <!-- Agent cards will be dynamically generated here -->
        </div>
    </div>
    
    <div id="right-panel" class="hud-panel">
        <div class="panel-header event-log-header">// EVENT LOG</div>
        <div class="panel-content">
            <div class="event-log" id="event-log-container">
                <!-- Event log entries will be dynamically added here -->
            </div>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS2DRenderer.js"></script>
    <script src="worldstate.js"></script>
    <script>
        // Event Log Management
        const eventLogContainer = document.getElementById('event-log-container');
        const MAX_LOG_ENTRIES = 60;
        let logEntries = [];

        // Global addLog function
        window.addLog = function(message, type = 'system') {
            const timestamp = new Date();
            const timeString = timestamp.toLocaleTimeString('en-US', { 
                hour12: false, 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit' 
            });
            
            const logEntry = {
                time: timeString,
                message: message,
                type: type,
                timestamp: timestamp
            };
            
            logEntries.push(logEntry);
            
            // Limit to MAX_LOG_ENTRIES
            if (logEntries.length > MAX_LOG_ENTRIES) {
                logEntries.shift();
            }
            
            renderEventLog();
        };

        function renderEventLog() {
            if (!eventLogContainer) return;
            
            let logHTML = '';
            logEntries.forEach(entry => {
                const icon = getEventIcon(entry.type);
                logHTML += `
                    <div class="event-item event-${entry.type}">
                        <span class="event-time">[${entry.time}]</span>
                        <span>${icon} ${entry.message}</span>
                    </div>
                `;
            });
            
            eventLogContainer.innerHTML = logHTML;
            
            // Auto-scroll to bottom
            eventLogContainer.scrollTop = eventLogContainer.scrollHeight;
        }

        function getEventIcon(type) {
            const icons = {
                'move': '',
                'task': '⊕',
                'kill': '💀',
                'meeting': '🚨',
                'vote': '🗳',
                'system': ''
            };
            return icons[type] || '';
        }

        // Control Bar Functionality
        let gameSpeed = 3;
        let isPaused = false;
        let currentRound = 1;
        let cameraMode = 'orbit';

        // Speed control
        document.getElementById('speed-dots').addEventListener('click', (e) => {
            if (e.target.classList.contains('speed-dot')) {
                document.querySelectorAll('.speed-dot').forEach(dot => dot.classList.remove('active'));
                e.target.classList.add('active');
                gameSpeed = parseInt(e.target.dataset.speed);
                addLog(`Simulation speed set to ${gameSpeed}x`, 'system');
            }
        });

        // Control buttons
        document.getElementById('start-btn').addEventListener('click', () => {
            isPaused = false;
            addLog('Simulation started', 'system');
            if (window.WORLD) {
                // Spawn agents if they haven't been spawned yet
                if (window.WORLD.agents.length === 0) {
                    console.log('START: Spawning agents automatically...');
                    window.WORLD.spawnAgents();
                }
                window.WORLD.setPhase('roaming');
            }
        });

        document.getElementById('pause-btn').addEventListener('click', () => {
            isPaused = !isPaused;
            addLog(isPaused ? 'Simulation paused' : 'Simulation resumed', 'system');
        });

        document.getElementById('spawn-btn').addEventListener('click', () => {
            console.log('SPAWN BUTTON CLICKED');
            console.log('window.WORLD exists:', !!window.WORLD);
            console.log('window.WORLD type:', typeof window.WORLD);
            console.log('window.WORLD.spawnAgents exists:', !!(window.WORLD && window.WORLD.spawnAgents));
            console.log('All window properties:', Object.keys(window).filter(k => k.includes('WORLD')));
            
            addLog('Spawn button clicked - agents should spawn via start button', 'system');
            if (!window.WORLD || !window.WORLD.spawnAgents) {
                console.log('World or spawnAgents not available');
                addLog('Error: World not ready', 'system');
            }
        });

        document.getElementById('reset-btn').addEventListener('click', () => {
            currentRound = 1;
            isPaused = false;
            document.getElementById('round-counter').textContent = '01';
            addLog('Simulation reset', 'system');
            if (window.WORLD) {
                window.WORLD.setPhase('idle');
            }
        });

        // Camera toggle
        document.getElementById('camera-toggle').addEventListener('click', () => {
            cameraMode = cameraMode === 'orbit' ? 'fly' : 'orbit';
            document.getElementById('camera-toggle').textContent = `CAM: ${cameraMode.toUpperCase()}`;
            addLog(`Camera mode: ${cameraMode}`, 'system');
        });

        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050810);
        
        // Camera setup - initial position looking down
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 18, 14);
        camera.lookAt(0, 0, 0);
        
        // Renderer setup
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // CSS2DRenderer for labels
        const labelRenderer = new THREE.CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.getElementById('canvas-container').appendChild(labelRenderer.domElement);

        // OrbitControls for 3D camera movement
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 5;
        controls.maxDistance = 40;
        controls.maxPolarAngle = Math.PI / 2.1; // Prevent going below floor
        controls.autoRotate = false;
        controls.enablePan = true;
        
        // Lighting setup
        // Ambient light (dim blue, 0.3 intensity)
        const ambientLight = new THREE.AmbientLight(0x4444ff, 0.3);
        scene.add(ambientLight);
        
        // Directional light from top-right
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(10, 20, 5);
        directionalLight.castShadow = true;
        directionalLight.shadow.mapSize.width = 2048;
        directionalLight.shadow.mapSize.height = 2048;
        directionalLight.shadow.camera.near = 0.5;
        directionalLight.shadow.camera.far = 50;
        directionalLight.shadow.camera.left = -25;
        directionalLight.shadow.camera.right = 25;
        directionalLight.shadow.camera.top = 25;
        directionalLight.shadow.camera.bottom = -25;
        scene.add(directionalLight);
        
        // Grid floor setup
        const gridHelper = new THREE.GridHelper(50, 50, 0x008888, 0x004444);
        gridHelper.position.y = 0;
        scene.add(gridHelper);
        
        // Additional floor plane for shadows
        const floorGeometry = new THREE.PlaneGeometry(50, 50);
        const floorMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x050810,
            roughness: 0.8,
            metalness: 0.2
        });
        const floor = new THREE.Mesh(floorGeometry, floorMaterial);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -0.01;
        floor.receiveShadow = true;
        scene.add(floor);
        
        // Window resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // Room system
        const rooms = [];
        const connectionLines = [];
        
        // Agent system
        const agents = [];
        window.agentMeshes = new Map(); // agentId -> mesh
        
        // New 7-room layout
        const ROOMS = {
            cafeteria:  { x:  0,  z: -4, size: 'large'  },
            reactor:    { x: -8,  z:  0, size: 'medium' },
            medbay:     { x: -5,  z:  3, size: 'small'  },
            security:   { x: -2,  z:  1, size: 'small'  },
            electrical: { x:  0,  z:  5, size: 'medium' },
            storage:    { x:  4,  z:  4, size: 'medium' },
            admin:      { x:  6,  z: -1, size: 'large'  }
        };

        // Define room data with new positions
        const roomData = [
            { name: 'Cafeteria', position: { x: ROOMS.cafeteria.x, y: 0, z: ROOMS.cafeteria.z }, size: ROOMS.cafeteria.size },
            { name: 'Reactor', position: { x: ROOMS.reactor.x, y: 0, z: ROOMS.reactor.z }, size: ROOMS.reactor.size },
            { name: 'MedBay', position: { x: ROOMS.medbay.x, y: 0, z: ROOMS.medbay.z }, size: ROOMS.medbay.size },
            { name: 'Security', position: { x: ROOMS.security.x, y: 0, z: ROOMS.security.z }, size: ROOMS.security.size },
            { name: 'Electrical', position: { x: ROOMS.electrical.x, y: 0, z: ROOMS.electrical.z }, size: ROOMS.electrical.size },
            { name: 'Storage', position: { x: ROOMS.storage.x, y: 0, z: ROOMS.storage.z }, size: ROOMS.storage.size },
            { name: 'Admin', position: { x: ROOMS.admin.x, y: 0, z: ROOMS.admin.z }, size: ROOMS.admin.size }
        ];

        // Connection pairs for 7-room layout
        const connectionPairs = [
            { from: 'cafeteria', to: 'reactor' },
            { from: 'cafeteria', to: 'security' },
            { from: 'cafeteria', to: 'admin' },
            { from: 'reactor', to: 'medbay' },
            { from: 'medbay', to: 'security' },
            { from: 'security', to: 'electrical' },
            { from: 'electrical', to: 'storage' },
            { from: 'storage', to: 'admin' }
        ];
        
        // Get room size parameters based on importance for 7-room layout
        function getRoomSize(roomName) {
            // Large rooms (radius 1.4): cafeteria, admin
            const largeRooms = ['Cafeteria', 'Admin'];
            // Medium rooms (radius 1.0): reactor, electrical, storage
            const mediumRooms = ['Reactor', 'Electrical', 'Storage'];
            // Small rooms (radius 0.7): medbay, security
            const smallRooms = ['MedBay', 'Security'];
            
            if (largeRooms.includes(roomName)) {
                return { radius: 1.4, height: 0.2, ringRadius: 1.6, ringThickness: 0.12 };
            } else if (mediumRooms.includes(roomName)) {
                return { radius: 1.0, height: 0.15, ringRadius: 1.2, ringThickness: 0.1 };
            } else if (smallRooms.includes(roomName)) {
                return { radius: 0.7, height: 0.12, ringRadius: 0.9, ringThickness: 0.08 };
            } else {
                return { radius: 1.0, height: 0.15, ringRadius: 1.2, ringThickness: 0.1 }; // default medium
            }
        }

        // Create room function
        function createRoom(roomData) {
            const room = {
                name: roomData.name,
                position: new THREE.Vector3(roomData.position.x, roomData.position.y, roomData.position.z),
                connections: roomData.connections,
                mesh: null,
                ring: null,
                label: null
            };
            
            const sizeParams = getRoomSize(roomData.name);
            
            // Create platform (flat cylinder with importance-based size)
            const platformGeometry = new THREE.CylinderGeometry(sizeParams.radius, sizeParams.radius, sizeParams.height, 32);
            const platformMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x0d1428,
                roughness: 0.7,
                metalness: 0.3,
                emissive: 0x004444,
                emissiveIntensity: 0.2
            });
            room.mesh = new THREE.Mesh(platformGeometry, platformMaterial);
            room.mesh.position.copy(room.position);
            room.mesh.castShadow = true;
            room.mesh.receiveShadow = true;
            scene.add(room.mesh);
            
            // Create glowing ring (torus with radius = platform radius + 0.2)
            const ringGeometry = new THREE.TorusGeometry(sizeParams.ringRadius, sizeParams.ringThickness, 8, 32);
            const ringMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x00ffff,
                roughness: 0.2,
                metalness: 0.8,
                emissive: 0x00ffff,
                emissiveIntensity: 0.6
            });
            room.ring = new THREE.Mesh(ringGeometry, ringMaterial);
            room.ring.position.copy(room.position);
            room.ring.position.y += 0.08; // Adjusted for y = 0
            room.ring.rotation.x = Math.PI / 2;
            scene.add(room.ring);
            
            // Create label with importance-based font size
            const labelDiv = document.createElement('div');
            labelDiv.className = 'room-label';
            labelDiv.textContent = room.name;
            const fontSize = sizeParams.radius === 1.4 ? '14px' : sizeParams.radius === 0.7 ? '10px' : '12px';
            labelDiv.style.color = '#00ffff';
            labelDiv.style.fontSize = fontSize;
            labelDiv.style.fontFamily = 'Courier New, monospace';
            labelDiv.style.textShadow = '0 0 5px rgba(0, 255, 255, 0.8)';
            labelDiv.style.fontWeight = 'bold';
            labelDiv.style.whiteSpace = 'nowrap';
            
            room.label = new THREE.CSS2DObject(labelDiv);
            room.label.position.copy(room.position);
            room.label.position.y += 1.5; // Adjusted for y = 0
            scene.add(room.label);
            
            return room;
        }
        
        // Create simple line connections between rooms
        function createConnectionLines() {
            console.log('=== CREATING ROOM CONNECTIONS ===');
            
            // Clear existing connections
            connectionLines.forEach(line => scene.remove(line));
            connectionLines.length = 0;
            
            const connectionMaterial = new THREE.LineBasicMaterial({
                color: 0x00e5ff,
                opacity: 0.25,
                transparent: true
            });
            
            connectionPairs.forEach(pair => {
                const fromRoom = rooms.find(r => r.name.toLowerCase() === pair.from);
                const toRoom = rooms.find(r => r.name.toLowerCase() === pair.to);
                
                if (fromRoom && toRoom) {
                    // Create line geometry between room centers
                    const points = [
                        new THREE.Vector3(fromRoom.position.x, 0.2, fromRoom.position.z),
                        new THREE.Vector3(toRoom.position.x, 0.2, toRoom.position.z)
                    ];
                    
                    const lineGeometry = new THREE.BufferGeometry().setFromPoints(points);
                    const line = new THREE.Line(lineGeometry, connectionMaterial);
                    
                    scene.add(line);
                    connectionLines.push(line);
                    
                    // Log connection to console for verification
                    console.log(`Connection: ${fromRoom.name} ↔ ${toRoom.name}`);
                    console.log(`  From: (${fromRoom.position.x}, ${fromRoom.position.z})`);
                    console.log(`  To: (${toRoom.position.x}, ${toRoom.position.z})`);
                } else {
                    console.log(`FAILED to create connection: ${pair.from} ↔ ${pair.to}`);
                    console.log(`  From room found: ${!!fromRoom}`);
                    console.log(`  To room found: ${!!toRoom}`);
                }
            });
            
            console.log(`Created ${connectionLines.length} connection lines`);
            console.log('=== END ROOM CONNECTIONS ===');
        }
        
        // Create all rooms
        function createRooms() {
            roomData.forEach(data => {
                const room = createRoom(data);
                rooms.push(room);
            });
        }
        
        // Clear existing rooms and connections
        function clearRooms() {
            // Remove all room meshes, rings, and labels
            rooms.forEach(room => {
                if (room.mesh) scene.remove(room.mesh);
                if (room.ring) scene.remove(room.ring);
                if (room.label) scene.remove(room.label);
            });
            rooms.length = 0;
            
            // Remove all connection lines
            connectionLines.forEach(line => scene.remove(line));
            connectionLines.length = 0;
        }

        // Create rooms and connections
        clearRooms();
        createRooms();
        createConnectionLines();
        
        // Get room position helper function
        window.getRoomPosition = function(roomId) {
            const roomPositions = {
                cafeteria: { x: 0, z: -4 },
                reactor: { x: -8, z: 0 },
                medbay: { x: -5, z: 3 },
                security: { x: -2, z: 1 },
                electrical: { x: 0, z: 5 },
                storage: { x: 4, z: 4 },
                admin: { x: 6, z: -1 }
            };
            return roomPositions[roomId] || { x: 0, z: 0 };
        }

        // Agent mesh creation function
        window.spawnAgentMesh = function(agent) {
            console.log('Creating mesh for:', agent.name, 'color:', agent.color)
            
            // Create agent group
            const agentGroup = new THREE.Group();
            
            // Body: capsule shape using CylinderGeometry + 2 SphereGeometry on top/bottom
            const bodyGeometry = new THREE.CylinderGeometry(0.3, 0.3, 0.6, 16);
            const bodyMaterial = new THREE.MeshStandardMaterial({
                color: agent.color,
                roughness: 0.3,
                metalness: 0.7,
                emissive: agent.color,
                emissiveIntensity: 0.4
            });
            
            const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
            body.position.y = 0.3;
            body.castShadow = true;
            body.receiveShadow = true;
            
            // Top sphere (head)
            const topSphereGeometry = new THREE.SphereGeometry(0.3, 16, 16);
            const topSphere = new THREE.Mesh(topSphereGeometry, bodyMaterial);
            topSphere.position.y = 0.6;
            topSphere.castShadow = true;
            
            // Bottom sphere (feet)
            const bottomSphereGeometry = new THREE.SphereGeometry(0.3, 16, 16);
            const bottomSphere = new THREE.Mesh(bottomSphereGeometry, bodyMaterial);
            bottomSphere.position.y = 0;
            bottomSphere.castShadow = true;
            
            // Visor: small flattened sphere on front-upper body
            const visorGeometry = new THREE.SphereGeometry(0.2, 16, 16);
            visorGeometry.scale(1, 0.75, 0.5); // Scale to flatten it
            const visorMaterial = new THREE.MeshStandardMaterial({
                color: 0xaaddff,
                emissive: 0xaaddff,
                emissiveIntensity: 0.8,
                roughness: 0.1,
                metalness: 0.9
            });
            
            const visor = new THREE.Mesh(visorGeometry, visorMaterial);
            visor.position.set(0, 0.5, 0.25); // Front-upper position
            visor.castShadow = true;
            
            // Glow ring at feet: torus, radius 0.35, tube 0.04, color agent.color, opacity 0.5
            const glowRingGeometry = new THREE.TorusGeometry(0.35, 0.04, 8, 16);
            const glowRingMaterial = new THREE.MeshStandardMaterial({
                color: agent.color,
                transparent: true,
                opacity: 0.5,
                emissive: agent.color,
                emissiveIntensity: 0.6,
                roughness: 0.1,
                metalness: 0.8
            });
            
            const glowRing = new THREE.Mesh(glowRingGeometry, glowRingMaterial);
            glowRing.position.y = 0.05;
            glowRing.rotation.x = Math.PI / 2; // Lay flat
            
            // Add all parts to group
            agentGroup.add(body);
            agentGroup.add(topSphere);
            agentGroup.add(bottomSphere);
            agentGroup.add(visor);
            agentGroup.add(glowRing);
            
            // Name tag: CSS2DObject floating 1 unit above agent, shows agent.name in agent.color
            const labelDiv = document.createElement('div');
            labelDiv.className = 'agent-label';
            labelDiv.textContent = agent.name;
            labelDiv.style.color = agent.color;
            labelDiv.style.fontSize = '12px';
            labelDiv.style.fontFamily = 'Courier New, monospace';
            labelDiv.style.fontWeight = 'bold';
            labelDiv.style.textShadow = `0 0 5px ${agent.color}`;
            labelDiv.style.whiteSpace = 'nowrap';
            labelDiv.style.pointerEvents = 'none';
            labelDiv.style.backgroundColor = 'rgba(0, 0, 0, 0.7)';
            labelDiv.style.padding = '2px 6px';
            labelDiv.style.borderRadius = '3px';
            labelDiv.style.border = `1px solid ${agent.color}`;
            
            const nameLabel = new THREE.CSS2DObject(labelDiv);
            nameLabel.position.y = 1.2; // 1 unit above agent
            
            agentGroup.add(nameLabel);
            
            // Position agent at room location with slight random offset
            const roomPos = getRoomPosition(agent.currentRoom);
            agentGroup.position.set(
                roomPos.x + (Math.random() - 0.5) * 1.5,
                0.5,
                roomPos.z + (Math.random() - 0.5) * 1.5
            );
            
            // Add to scene and store reference
            scene.add(agentGroup);
            console.log('Mesh added to scene for:', agent.name, 'position:', agentGroup.position)
            console.log('Total scene children:', scene.children.length)
            agentMeshes.set(agent.id, agentGroup);
            
            // Store mesh reference on agent object
            agent.mesh = agentGroup;
            
            console.log(`Created detailed 3D mesh for ${agent.name} in ${agent.currentRoom}`);
        };

        // Update agent mesh position when moving between rooms
        window.updateAgentMeshPosition = function(agent) {
            if (!agent.mesh) return;
            
            const roomPos = getRoomPosition(agent.currentRoom);
            agent.mesh.position.set(
                roomPos.x + (Math.random() - 0.5) * 1.5,
                0.5,
                roomPos.z + (Math.random() - 0.5) * 1.5
            );
            
            console.log(`Updated ${agent.name} position to ${agent.currentRoom}:`, agent.mesh.position);
        };
        
        // Add floating particles for dynamic effect
        const particles = [];
        function createParticles() {
            const particleGeometry = new THREE.SphereGeometry(0.05, 8, 8);
            const particleMaterial = new THREE.MeshBasicMaterial({ 
                color: 0x00ffff,
                transparent: true,
                opacity: 0.8
            });
            
            for (let i = 0; i < 50; i++) {
                const particle = new THREE.Mesh(particleGeometry, particleMaterial);
                particle.position.set(
                    (Math.random() - 0.5) * 30,
                    Math.random() * 10,
                    (Math.random() - 0.5) * 30
                );
                particle.velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 0.02,
                    Math.random() * 0.01,
                    (Math.random() - 0.5) * 0.02
                );
                particles.push(particle);
                scene.add(particle);
            }
        }
        
        // Add rotating lights
        const rotatingLights = [];
        function createRotatingLights() {
            for (let i = 0; i < 3; i++) {
                const light = new THREE.PointLight(0x00ffff, 0.5, 10);
                light.position.set(
                    Math.cos(i * Math.PI * 2 / 3) * 15,
                    5,
                    Math.sin(i * Math.PI * 2 / 3) * 15
                );
                rotatingLights.push(light);
                scene.add(light);
            }
        }
        
        // Create dynamic elements
        createParticles();
        createRotatingLights();
        
        // Game loop variables
        let lastTickTime = 0;
        const tickInterval = 1000; // 1 second between ticks (adjustable)

        // Render loop
        function animate() {
            requestAnimationFrame(animate);
            
            const time = Date.now() * 0.001;
            
            // Game tick system
            if (window.WORLD && window.WORLD.phase === 'roaming') {
                if (time - lastTickTime >= tickInterval / 1000) {
                    window.WORLD.tick();
                    lastTickTime = time;
                }
            }
            
            // Update OrbitControls for smooth camera movement
            controls.update();
            
            // Animate room rings with more visible rotation and pulsing
            rooms.forEach(room => {
                if (room.ring) {
                    room.ring.material.emissiveIntensity = 0.6 + Math.sin(time + room.position.x) * 0.4;
                    room.ring.rotation.z = time * 0.5; // Rotate the rings
                }
                // Float the platforms slightly
                if (room.mesh) {
                    room.mesh.position.y = Math.sin(time * 2 + room.position.x) * 0.1;
                }
            });
            
            // Animate particles
            particles.forEach(particle => {
                particle.position.add(particle.velocity);
                particle.material.opacity = 0.3 + Math.sin(time * 3 + particle.position.x) * 0.5;
                
                // Wrap particles around boundaries
                if (Math.abs(particle.position.x) > 15) particle.velocity.x *= -1;
                if (particle.position.y > 10 || particle.position.y < 0) particle.velocity.y *= -1;
                if (Math.abs(particle.position.z) > 15) particle.velocity.z *= -1;
            });
            
            // Rotate lights around the scene
            rotatingLights.forEach((light, i) => {
                const angle = time + i * Math.PI * 2 / 3;
                light.position.x = Math.cos(angle) * 15;
                light.position.z = Math.sin(angle) * 15;
                light.position.y = 5 + Math.sin(time * 2) * 2;
                light.intensity = 0.3 + Math.sin(time * 3 + i) * 0.2;
            });
            
            // Animate connection lines with pulsing effect
            connectionLines.forEach((line, i) => {
                const material = line.material;
                material.opacity = 0.3 + Math.sin(time * 2 + i * 0.5) * 0.3;
            });
            
            // Smooth agent movement every frame
            if (window.WORLD && window.WORLD.agents) {
                for (const agent of WORLD.agents) {
                    const mesh = window.agentMeshes?.get(agent.id)
                    if (!mesh || !agent.targetPosition) continue

                    if (agent.isMoving) {
                        mesh.position.lerp(agent.targetPosition, 0.02)
                        // Rotate to face direction of movement
                        mesh.rotation.y += 0.03
                        // Arrived?
                        if (mesh.position.distanceTo(agent.targetPosition) < 0.1) {
                            mesh.position.copy(agent.targetPosition)
                            agent.isMoving = false
                            mesh.rotation.y = 0
                        }
                    } else {
                        // Idle bob animation
                        mesh.position.y = 0.5 + Math.sin(Date.now() * 0.002 + agent.id) * 0.06
                    }
                }
            }
            
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        
        // Start the render loop
        animate();
        
        console.log('Three.js scene initialized successfully');
        console.log('Camera position:', camera.position);
        console.log('Scene background color:', scene.background.getHexString());
    </script>
</body>
</html>
